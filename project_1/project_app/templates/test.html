<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>

    <style>





        @media (max-width: 480px) {
            .content {
                flex-direction: column;
                width: 100%;
                padding: 0 20px;
                box-sizing: border-box;
            }

            .content h1 {
                position: relative;
                top: 0;
                margin-bottom: 40px;
                font-size: 28px;
                white-space: normal; /* Allows long usernames to wrap */
                text-align: center;
            }

            .btn {
                width: 100%; /* Makes button span the container for easier tapping */
                max-width: 300px;
                padding: 15px 20px;
            }

            .nav {
                top: 15px;
                right: 15px;
            }

            .logout-btn {
                padding: 8px 14px;
                font-size: 14px;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* NAVBAR */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 7%;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            width: 100%;
            height: 80px;
        }

        .navbar h1 {
            color: white;
            font-size: 28px;
        }

        /* MAIN LAYOUT */

        .main {
            display: flex;
            margin-top: 80px;
            min-height: calc(100vh - 80px);
        }

        /* LEFT MENU */

        .left-menu {
            width: 260px;
            background: white;
            padding: 25px;
            border-right: 1px solid #ddd;
        }

        .left-menu h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .user-list {
            list-style: none;
        }

        .user-list li {
            margin-bottom: 12px;
        }

        .user-list a {
            display: block;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 8px;
            color: #333;
            text-decoration: none;
            transition: 0.2s;
        }

        .user-list a:hover {
            background: #4f46e5;
            color: white;
        }

        .back-btn {
            display: block;
            margin-top: 30px;
            text-align: center;
            padding: 12px;
            background: #ef4444;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #dc2626;
        }

        /* CONTAINER */

        .container {
            flex: 1;
            background: white;
            margin: 25px;
            padding: 30px;
            border-radius: 12px;
        }

        .container h2 {
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .update-btn {
            background: #4f46e5;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .update-btn:hover {
            background: #4338ca;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">
        <h1>Edit User</h1>
    </nav>

    <!-- MAIN -->

    <div class="main">

        <!-- LEFT MENU -->

        <div class="left-menu">

            <h3>User List</h3>

            <ul class="user-list">

                {% for u in users %}

                <li>
                    <a href="{% url 'edit_user' u.username %}">
                        {{ u.username }}
                    </a>
                </li>

                {% endfor %}

            </ul>

            <a href="{% url 'user_menu' %}" class="back-btn">
                ← Back
            </a>

        </div>

        <!-- EDIT FORM -->

        <div class="container">

            <h2>Edit User</h2>

            <form method="POST">

                {% csrf_token %}

                <label>Username</label>
                <input type="text"
                       name="username"
                       value="{{ user.username }}">

                <label>Password</label>
                <input type="text"
                       name="password"
                       value="{{ user.password }}">

                <label>Group User</label>
                <input type="text"
                       name="id_group_user"
                       value="{{ user.id_group_user }}">

                <div class="buttons">

                    <button type="submit" class="update-btn">
                        Update
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
